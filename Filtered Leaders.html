<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Category Leaders</title>
    <style>
        body { margin: 0; padding: 0; background: transparent; font-family: sans-serif; overflow: hidden; }
        
        .main-wrapper { 
            width: 960px; padding: 20px; position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%);
        }
        
        .master-header { 
            background: rgba(20, 24, 28, 0.95);
            padding: 15px;
            border-radius: 8px;
            border-bottom: 5px solid #d97736;
            text-align: center; color: #fff; font-size: 28px; font-weight: 900; 
            text-transform: uppercase; margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .columns { display: flex; gap: 20px; }
        .column { flex: 1; min-width: 0; } 
        
        /* Boxed Subheader Styling */
        .col-title { 
            background: rgba(20, 24, 28, 0.95); 
            padding: 10px 15px; 
            border-radius: 8px; 
            border-bottom: 4px solid #d97736; 
            color: #fff; 
            font-size: 22px; 
            font-weight: 900; 
            text-transform: uppercase; 
            margin-bottom: 15px; 
            text-align: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        
        .cat-block { 
            background: rgba(20, 24, 28, 0.95); margin-bottom: 10px;
            border-radius: 8px; border-left: 5px solid #d97736;
            overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .cat-name { background: #1a1f24; padding: 8px 12px; color: #aaa; font-size: 12px; font-weight: 900; text-transform: uppercase; }
        .row { display: flex; align-items: center; padding: 10px 12px; }
        
        .leader-name { flex: 1; color: #fff; font-weight: 700; font-size: 18px; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .leader-dist { color: #aaa; font-size: 16px; font-weight: 700; padding-left: 15px; text-transform: uppercase; white-space: nowrap; }
        .winner-text { color: #4ade80; font-weight: 900; }

        .status { padding: 40px; text-align: center; color: #666; font-size: 18px; }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="master-header">Category Leaders</div>
        
        <div class="columns">
            <div class="column">
                <div class="col-title">Solo</div>
                <div id="solo-list"></div>
            </div>
            <div class="column">
                <div class="col-title">Teams</div>
                <div id="team-list"></div>
            </div>
        </div>
    </div>

    <script>
        const EVENT_ID = "6a4ed5aa90b2726af2881807"; 

        function getTeamSize(divisionName) {
            const match = divisionName.match(/(\d+)/);
            return match ? parseInt(match[0]) : 0;
        }

        function getDistance(athlete) {
            if (!athlete.current || athlete.current.toFinish === undefined || athlete.current.toFinish === null) {
                return 999999; 
            }
            return athlete.current.toFinish;
        }

        async function updateLeaderboards() {
            try {
                const response = await fetch(`https://racemap.com/api/data/v1/${EVENT_ID}/current`);
                const data = await response.json();
                if (!data.starters) return;

                const soloList = document.getElementById('solo-list');
                const teamList = document.getElementById('team-list');
                soloList.innerHTML = '';
                teamList.innerHTML = '';

                const categories = [...new Set(data.starters.map(s => s.tags?.Division))].filter(Boolean);
                const soloCats = categories.filter(c => !c.toLowerCase().includes("team") && !c.toLowerCase().includes("relay"));
                const teamCats = categories.filter(c => c.toLowerCase().includes("team") || c.toLowerCase().includes("relay"));

                teamCats.sort((a, b) => getTeamSize(a) - getTeamSize(b));

                soloCats.forEach(cat => renderCategory(cat, soloList, data.starters));
                teamCats.forEach(cat => renderCategory(cat, teamList, data.starters));

            } catch (e) { console.error(e); }
        }

        function renderCategory(cat, container, starters) {
            const racers = starters.filter(s => s.tags?.Division === cat);
            const leader = racers.sort((a, b) => getDistance(a) - getDistance(b))[0];

            if (leader) {
                const rawDist = getDistance(leader);
                let displayDist = "";

                if (rawDist === 999999) {
                    displayDist = "WAITING"; 
                } else if (rawDist <= 0) {
                    displayDist = '<span class="winner-text">WINNER</span>';
                } else {
                    displayDist = `${(rawDist * 0.000621371).toFixed(1)} mi`;
                }
                
                const div = document.createElement('div');
                div.className = 'cat-block';
                div.innerHTML = `
                    <div class="cat-name">${cat.replace(' Division', '').replace(' Team', '').replace(' Relay', '')}</div>
                    <div class="row">
                        <div class="leader-name">${leader.name}</div>
                        <div class="leader-dist">${displayDist}</div>
                    </div>
                `;
                container.appendChild(div);
            }
        }

        updateLeaderboards();
        setInterval(updateLeaderboards, 60000);
    </script>
</body>
</html>
