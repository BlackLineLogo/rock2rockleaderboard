<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Split Leaderboard</title>
    <style>
        body { margin: 0; padding: 0; background: transparent; font-family: sans-serif; overflow: hidden; }
        
        /* Centering the wrapper */
        .wrapper { 
            display: flex; gap: 20px; width: 960px; padding: 20px;
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%);
        }
        
        .col { 
            flex: 1; background: rgba(20, 24, 28, 0.95); 
            border-radius: 8px; border-top: 6px solid #d97736;
            overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .header { background: #1a1f24; padding: 15px; text-align: center; color: #fff; font-weight: 900; text-transform: uppercase; border-bottom: 2px solid #d97736; }
        
        .row { display: flex; align-items: center; padding: 12px 15px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .rank { width: 30px; color: #d97736; font-weight: 900; }
        .name { flex: 1; color: #fff; font-weight: 700; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 10px; }
        .dist { color: #aaa; font-size: 14px; font-weight: 700; }

        .status { padding: 20px; text-align: center; color: #666; }
    </style>
</head>
<body>

    <div class="wrapper">
        <!-- Solo Column -->
        <div class="col" id="solo-col">
            <div class="header">Solo Leaders</div>
            <div id="solo-content"><div class="status">Syncing...</div></div>
        </div>

        <!-- Team Column -->
        <div class="col" id="team-col">
            <div class="header">Team Leaders</div>
            <div id="team-content"><div class="status">Syncing...</div></div>
        </div>
    </div>

    <script>
        const EVENT_ID = "6a4ed5aa90b2726af2881807"; 

        async function updateLeaderboards() {
            try {
                const response = await fetch(`https://racemap.com/api/data/v1/${EVENT_ID}/current`);
                const data = await response.json();
                if (!data.starters) return;

                // Sort by distance remaining
                const all = data.starters.sort((a, b) => (a.current?.toFinish || 0) - (b.current?.toFinish || 0));
                
                const teams = all.filter(s => s.tags?.Division?.toLowerCase().includes("team"));
                const solos = all.filter(s => !s.tags?.Division?.toLowerCase().includes("team"));

                renderList(solos, 'solo-content');
                renderList(teams, 'team-content');

            } catch (e) { console.error(e); }
        }

        function renderList(list, elementId) {
            const container = document.getElementById(elementId);
            if (list.length === 0) {
                container.innerHTML = '<div class="status">No racers found</div>';
                return;
            }

            let html = '';
            // Limiting to Top 5
            list.slice(0, 5).forEach((r, i) => {
                const dist = ((r.current?.toFinish * 0.000621371) || 0).toFixed(1);
                html += `
                    <div class="row">
                        <div class="rank">${i + 1}</div>
                        <div class="name">${r.name}</div>
                        <div class="dist">${dist} mi</div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        updateLeaderboards();
        setInterval(updateLeaderboards, 60000);
    </script>
</body>
</html>
