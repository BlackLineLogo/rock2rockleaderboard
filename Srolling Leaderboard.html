<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Race Ticker</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        .ticker-wrap {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100px;
            background: rgba(20, 24, 28, 0.95);
            border-top: 4px solid #d97736;
            display: flex;
            align-items: center;
            box-shadow: 0 -10px 25px rgba(0,0,0,0.4); 
        }

        .ticker-label {
            background: #d97736;
            color: #1a1f24;
            font-weight: 900;
            font-size: 24px;
            padding: 0 40px;
            height: 100%;
            display: flex;
            align-items: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            z-index: 10;
        }

        .ticker-content {
            flex: 1;
            overflow: hidden;
            position: relative;
            height: 100%;
        }

        .ticker-track {
            display: inline-flex;
            align-items: center;
            height: 100%;
            white-space: nowrap;
            position: absolute;
            will-change: transform;
            /* We will control the speed via JavaScript now */
            animation: scroll-left linear infinite;
        }

        .ticker-item {
            display: inline-flex;
            align-items: center;
            padding: 0 40px;
            color: #fff;
            font-size: 22px;
            font-weight: 700;
            position: relative;
        }

        .ticker-item::after {
            content: "•";
            position: absolute;
            right: 0;
            color: #55626d;
        }

        .rank { color: #d97736; margin-right: 12px; font-weight: 900;}
        .name { text-transform: uppercase; margin-right: 15px; color: #f0f0f0;}
        .metric { font-weight: 800; color: #88929b; }
        .finished { color: #ffffff; letter-spacing: 1px;}

        @keyframes scroll-left {
            0% { transform: translateX(100vw); }
            100% { transform: translateX(-100%); }
        }
    </style>
</head>
<body>

    <div class="ticker-wrap">
        <div class="ticker-label">ROCK 2 ROCK</div>
        <div class="ticker-content">
            <div class="ticker-track" id="ticker-track">
                <div class="ticker-item">Loading live race data...</div>
            </div>
        </div>
    </div>

    <script>
        const EVENT_ID = "6a4ed5aa90b2726af2881807"; 
        const REFRESH_RATE_MS = 60000; 
        // Speed in pixels per second. Increase for faster scroll, decrease for slower.
        const PIXELS_PER_SECOND = 60; 

        async function fetchRaceData() {
            try {
                const response = await fetch(`https://racemap.com/api/data/v1/${EVENT_ID}/current`);
                if (!response.ok) throw new Error("API Error");
                const data = await response.json();
                
                if (!data.starters || data.starters.length === 0) return;

                const sortedAthletes = data.starters.sort((a, b) => {
                    let aDist = (typeof a.current?.toFinish === 'number') ? a.current.toFinish : Infinity;
                    let bDist = (typeof b.current?.toFinish === 'number') ? b.current.toFinish : Infinity;
                    return aDist - bDist;
                });

                let htmlString = '';
                
                sortedAthletes.forEach((athlete, index) => {
                    const milesToFinish = (athlete.current?.toFinish * 0.000621371) || 0;
                    const athleteName = athlete.name || "Paddler";
                    
                    let displayMetric = "";
                    
                    if (milesToFinish > 0.05) {
                        displayMetric = `<span class="metric">${milesToFinish.toFixed(1)} mi to go</span>`;
                    } else {
                        displayMetric = `<span class="metric finished">🏁 FINISHED</span>`;
                    }

                    htmlString += `
                        <div class="ticker-item">
                            <span class="rank">${index + 1}</span>
                            <span class="name">${athleteName}</span>
                            ${displayMetric}
                        </div>
                    `;
                });

                const track = document.getElementById('ticker-track');
                track.innerHTML = htmlString + htmlString;

                // Calculate dynamic duration based on content width
                // Width / Speed = Duration
                const width = track.scrollWidth / 2; // Divided by 2 because we doubled the html
                track.style.animationDuration = (width / PIXELS_PER_SECOND) + 's';

            } catch (error) {
                console.error("Data fetch failed:", error);
            }
        }

        fetchRaceData();
        setInterval(fetchRaceData, REFRESH_RATE_MS);
    </script>
</body>
</html>
