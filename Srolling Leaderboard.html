<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Race Ticker</title>
    <style>
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background: transparent; font-family: sans-serif; }

        .ticker-wrap {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 100px;
            background: rgba(20, 24, 28, 0.95);
            border-top: 4px solid #d97736;
            display: flex; align-items: center;
            box-shadow: 0 -10px 25px rgba(0,0,0,0.4); 
        }

        .ticker-label {
            background: #d97736; color: #1a1f24;
            font-weight: 900; font-size: 24px; padding: 0 40px;
            height: 100%; display: flex; align-items: center;
            text-transform: uppercase; letter-spacing: 2px; z-index: 10;
        }

        .ticker-content { flex: 1; overflow: hidden; position: relative; height: 100%; }

        .ticker-track {
            display: inline-flex; align-items: center; height: 100%;
            white-space: nowrap; position: absolute; will-change: transform;
            animation: scroll-left linear infinite;
        }

        .ticker-item {
            display: inline-flex; align-items: center; padding: 0 40px;
            color: #fff; font-size: 26px; 
            font-weight: 700; position: relative;
        }

        .ticker-item::after { content: "•"; position: absolute; right: 0; color: #55626d; }

        .rank { color: #d97736; margin-right: 12px; font-weight: 900; font-size: 24px;}
        .name { text-transform: uppercase; margin-right: 15px; color: #f0f0f0; font-size: 26px; }
        .metric { font-weight: 800; color: #88929b; margin-left: 10px; font-size: 22px; }
        .finished { color: #ffffff; letter-spacing: 1px;}

        .type-team, .type-solo { font-size: 16px; padding: 2px 8px; border-radius: 4px; margin-right: 10px; text-transform: uppercase; }
        .type-team { background: #d97736; color: white; }
        .type-solo { background: #444; color: #ccc; }

        @keyframes scroll-left {
            0% { transform: translateX(100vw); }
            100% { transform: translateX(-100%); }
        }
    </style>
</head>
<body>

    <div class="ticker-wrap">
        <div class="ticker-label">ROCK 2 ROCK</div>
        <div class="ticker-content">
            <div class="ticker-track" id="ticker-track">
                <div class="ticker-item">Loading live race data...</div>
            </div>
        </div>
    </div>

    <script>
        const EVENT_ID = "6a4ed5aa90b2726af2881807"; 
        const REFRESH_RATE_MS = 60000; 
        const PIXELS_PER_SECOND = 35;

        function getCategoryType(divisionName) {
            if (!divisionName) return "SOLO";
            return divisionName.toLowerCase().includes("team") ? "TEAM" : "SOLO";
        }

        // Fix: Treat missing data as an extremely high distance so they sort to the back pre-race
        function getDistance(athlete) {
            if (athlete.current && athlete.current.toFinish !== undefined) {
                return athlete.current.toFinish;
            }
            return Infinity; 
        }

        async function fetchRaceData() {
            try {
                const response = await fetch(`https://racemap.com/api/data/v1/${EVENT_ID}/current`);
                if (!response.ok) throw new Error("API Error");
                const data = await response.json();
                
                if (!data.starters || data.starters.length === 0) return;

                const solos = data.starters
                    .filter(s => getCategoryType(s.tags?.Division) === 'SOLO')
                    .sort((a, b) => getDistance(a) - getDistance(b));
                
                const teams = data.starters
                    .filter(s => getCategoryType(s.tags?.Division) === 'TEAM')
                    .sort((a, b) => getDistance(a) - getDistance(b));

                const orderedAthletes = [...solos, ...teams];

                let htmlString = '';
                
                orderedAthletes.forEach((athlete, index) => {
                    const rawDistance = getDistance(athlete);
                    const athleteName = athlete.name || "Paddler";
                    const typeLabel = getCategoryType(athlete.tags?.Division);
                    const typeClass = typeLabel === "TEAM" ? "type-team" : "type-solo";
                    
                    let displayMetric = "";
                    
                    // 1. Pre-race or no signal
                    if (rawDistance === Infinity) {
                        displayMetric = `<span class="metric">ON COURSE</span>`;
                    } 
                    // 2. Still racing (> 0.05 miles or ~80 meters)
                    else if (rawDistance > 80) {
                        const milesToFinish = rawDistance * 0.000621371;
                        displayMetric = `<span class="metric">${milesToFinish.toFixed(1)} mi</span>`;
                    } 
                    // 3. Finished
                    else {
                        displayMetric = `<span class="metric finished">🏁 FINISH</span>`;
                    }

                    htmlString += `
                        <div class="ticker-item">
                            <span class="rank">${index + 1}</span>
                            <span class="${typeClass}">${typeLabel}</span>
                            <span class="name">${athleteName}</span>
                            ${displayMetric}
                        </div>
                    `;
                });

                const track = document.getElementById('ticker-track');
                track.innerHTML = htmlString + htmlString; 

                const width = track.scrollWidth / 2;
                track.style.animationDuration = (width / PIXELS_PER_SECOND) + 's';

            } catch (error) {
                console.error("Data fetch failed:", error);
            }
        }

        fetchRaceData();
        setInterval(fetchRaceData, REFRESH_RATE_MS);
    </script>
</body>
</html>
