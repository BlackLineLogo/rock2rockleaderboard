<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Race Leaderboard</title>
    <style>
        /* Base Broadcast Settings */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: transparent; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Main Container */
        .leaderboard-wrapper {
            position: absolute;
            top: 40px;
            left: 40px;
            width: 480px;
            background: rgba(20, 24, 28, 0.95); /* Deep slate */
            border-radius: 8px;
            border-left: 6px solid #d97736; /* Copper accent */
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.6);
            overflow: hidden;
        }

        /* Branding Header */
        .header {
            background: #1a1f24;
            padding: 16px 24px;
            border-bottom: 2px solid #2a3138;
        }
        .header-title {
            color: #ffffff;
            font-size: 28px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            line-height: 1.1;
        }
        .header-subtitle {
            color: #d97736;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 4px;
        }

        /* Athlete Rows */
        .row {
            display: flex;
            align-items: center;
            padding: 14px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .row:last-child { border-bottom: none; }
        .row:nth-child(even) { background: rgba(255, 255, 255, 0.02); }

        /* Typography */
        .rank-col {
            width: 45px;
            color: #d97736;
            font-size: 22px;
            font-weight: 900;
        }
        .name-col {
            flex-grow: 1;
            color: #f0f0f0;
            font-size: 19px;
            font-weight: 700;
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding-right: 15px;
        }
        .metric-col {
            color: #ffffff;
            font-size: 19px;
            font-weight: 800;
            text-align: right;
        }
        
        /* Loading State */
        .status-msg {
            padding: 40px 24px;
            text-align: center;
            color: #88929b;
            font-size: 16px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="leaderboard-wrapper">
        <div class="header">
            <div class="header-title">ROCK 2 ROCK</div>
            <div id="page-indicator" class="header-subtitle">Live Leaderboard</div>
        </div>
        <div id="board-content">
            <div class="status-msg">Syncing Race Timing...</div>
        </div>
    </div>

    <script>
        // ==========================================
        // CONFIGURATION
        // ==========================================
        const EVENT_ID = "6a4ed5aa90b2726af2881807"; 
        const REFRESH_RATE_MS = 60000;  // Fetch new data every 60 seconds
        const ROTATION_RATE_MS = 8000;  // Rotate leaderboard every 8 seconds
        const PAGE_SIZE = 5;            // Racers per page
        // ==========================================

        const boardContent = document.getElementById('board-content');
        
        // State variables
        let allAthletes = [];
        let currentPage = 0;
        let rotationInterval = null;

        async function fetchRaceData() {
            try {
                const response = await fetch(`https://racemap.com/api/data/v1/${EVENT_ID}/current`);
                
                if (!response.ok) throw new Error(`Server Error: ${response.status}`);
                const data = await response.json();
                
                if (!data.starters || data.starters.length === 0) {
                    boardContent.innerHTML = '<div class="status-msg">Waiting for start signal...</div>';
                    return;
                }

                // Sort by distance remaining and save to global state
                allAthletes = data.starters.sort((a, b) => {
                    let aDist = (typeof a.current?.toFinish === 'number') ? a.current.toFinish : Infinity;
                    let bDist = (typeof b.current?.toFinish === 'number') ? b.current.toFinish : Infinity;
                    return aDist - bDist;
                });

                // If this is the very first successful fetch, kick off the rotation
                if (!rotationInterval) {
                    renderNextPage(); // Render immediately
                    rotationInterval = setInterval(renderNextPage, ROTATION_RATE_MS);
                }

            } catch (error) {
                console.error("Data fetch failed:", error);
                if (boardContent.innerHTML.includes("Syncing") || boardContent.innerHTML.includes("Waiting")) {
                     boardContent.innerHTML = '<div class="status-msg">Reconnecting...</div>';
                }
            }
        }

        function renderNextPage() {
            if (allAthletes.length === 0) return;

            // Calculate start and end indices for the current chunk
            const startIndex = currentPage * PAGE_SIZE;
            const endIndex = startIndex + PAGE_SIZE;
            const pageAthletes = allAthletes.slice(startIndex, endIndex);

            // Generate HTML for this specific chunk
            let htmlString = '';
            pageAthletes.forEach((athlete, index) => {
                const milesToFinish = (athlete.current?.toFinish * 0.000621371) || 0;
                const displayMetric = milesToFinish > 0 ? `${milesToFinish.toFixed(1)} mi` : "FINISH";
                const athleteName = athlete.name || "Paddler";
                const overallRank = startIndex + index + 1; // Correct rank for the whole field

                htmlString += `
                    <div class="row">
                        <div class="rank-col">${overallRank}</div>
                        <div class="name-col">${athleteName}</div>
                        <div class="metric-col">${displayMetric}</div>
                    </div>
                `;
            });

            boardContent.innerHTML = htmlString;

            // Advance the page, reset to 0 if we've shown everyone
            currentPage++;
            if (currentPage * PAGE_SIZE >= allAthletes.length) {
                currentPage = 0;
            }
        }

        // Initialize immediately, then run on the set interval
        fetchRaceData();
        setInterval(fetchRaceData, REFRESH_RATE_MS);
    </script>
</body>
</html>
