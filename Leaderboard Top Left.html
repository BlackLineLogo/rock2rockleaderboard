<script>
    // ==========================================
    // CONFIGURATION
    // ==========================================
    const EVENT_ID = "6a4ed5aa90b2726af2881807"; 
    const REFRESH_RATE_MS = 60000;  // 60 seconds
    const ROTATION_RATE_MS = 8000;  // 8 seconds
    const PAGE_SIZE = 5;
    // ==========================================

    const boardContent = document.getElementById('board-content');
    
    let allAthletes = [];
    let currentPage = 0;
    let rotationInterval = null;

    // Helper to determine if a racer is a Team or Solo
    function getCategoryType(divisionName) {
        if (!divisionName) return "SOLO";
        return divisionName.toLowerCase().includes("team") ? "TEAM" : "SOLO";
    }

    async function fetchRaceData() {
        try {
            const response = await fetch(`https://racemap.com/api/data/v1/${EVENT_ID}/current`);
            if (!response.ok) throw new Error(`Server Error: ${response.status}`);
            const data = await response.json();
            
            if (!data.starters || data.starters.length === 0) {
                boardContent.innerHTML = '<div class="status-msg">Waiting for start signal...</div>';
                return;
            }

            // Sort by distance remaining
            allAthletes = data.starters.sort((a, b) => {
                let aDist = (typeof a.current?.toFinish === 'number') ? a.current.toFinish : Infinity;
                let bDist = (typeof b.current?.toFinish === 'number') ? b.current.toFinish : Infinity;
                return aDist - bDist;
            });

            if (!rotationInterval) {
                renderNextPage(); 
                rotationInterval = setInterval(renderNextPage, ROTATION_RATE_MS);
            }
        } catch (error) {
            console.error("Data fetch failed:", error);
        }
    }

    function renderNextPage() {
        if (allAthletes.length === 0) return;

        const startIndex = currentPage * PAGE_SIZE;
        const pageAthletes = allAthletes.slice(startIndex, startIndex + PAGE_SIZE);

        let htmlString = '';
        pageAthletes.forEach((athlete, index) => {
            const milesToFinish = (athlete.current?.toFinish * 0.000621371) || 0;
            const displayMetric = milesToFinish > 0 ? `${milesToFinish.toFixed(1)} mi` : "FINISH";
            const athleteName = athlete.name || "Paddler";
            
            // Determine type for label
            const typeLabel = getCategoryType(athlete.tags?.Division);
            const typeClass = typeLabel === "TEAM" ? "type-team" : "type-solo";

            htmlString += `
                <div class="row">
                    <div class="rank-col">${startIndex + index + 1}</div>
                    <div class="name-col">
                        ${athleteName}
                        <span class="${typeClass}">${typeLabel}</span>
                    </div>
                    <div class="metric-col">${displayMetric}</div>
                </div>
            `;
        });

        boardContent.innerHTML = htmlString;

        currentPage++;
        if (currentPage * PAGE_SIZE >= allAthletes.length) currentPage = 0;
    }

    fetchRaceData();
    setInterval(fetchRaceData, REFRESH_RATE_MS);
</script>

<!-- Add this to your <style> block to make the labels look good -->
<style>
    .type-team, .type-solo {
        font-size: 10px;
        padding: 2px 6px;
        border-radius: 4px;
        margin-left: 8px;
        vertical-align: middle;
        text-transform: uppercase;
    }
    .type-team { background: #d97736; color: white; }
    .type-solo { background: #444; color: #ccc; }
</style>
